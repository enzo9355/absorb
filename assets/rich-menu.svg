<svg xmlns="http://www.w3.org/2000/svg" width="2500" height="1686" viewBox="0 0 2500 1686" role="img" aria-label="Stock Papi LINE 圖文選單六格設計稿">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="1" stop-color="#102846"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2036"/>
      <stop offset="1" stop-color="#143557"/>
    </linearGradient>
    <style>
      .brand{font:800 56px "Noto Sans TC","Microsoft JhengHei",sans-serif;fill:#39c6a3;letter-spacing:4px}
      .label{font:800 140px "Noto Sans TC","Microsoft JhengHei",sans-serif;fill:#eef6ff}
      .hint{font:600 46px "Noto Sans TC","Microsoft JhengHei",sans-serif;fill:#9fb4cc}
      .code{font:900 82px "Noto Sans TC","Microsoft JhengHei",sans-serif;fill:#39c6a3}
      .tile{fill:url(#tile);stroke:#2b4f70;stroke-width:5}
      .pill{fill:#102b45;stroke:#39c6a3;stroke-width:4}
    </style>
  </defs>
  <rect width="2500" height="1686" fill="url(#bg)"/>
  <text class="brand" x="80" y="92">STOCK PAPI</text>
  <g transform="translate(42 132)">
    <rect class="tile" x="0" y="0" width="790" height="710" rx="46"/>
    <rect class="tile" x="810" y="0" width="790" height="710" rx="46"/>
    <rect class="tile" x="1620" y="0" width="790" height="710" rx="46"/>
    <rect class="tile" x="0" y="752" width="790" height="710" rx="46"/>
    <rect class="tile" x="810" y="752" width="790" height="710" rx="46"/>
    <rect class="tile" x="1620" y="752" width="790" height="710" rx="46"/>

    <g transform="translate(84 92)">
      <rect class="pill" x="0" y="0" width="138" height="108" rx="32"/>
      <text class="code" x="34" y="78">01</text>
      <text class="label" x="0" y="288">看大盤</text>
      <text class="hint" x="0" y="376">今天台股強不強</text>
    </g>

    <g transform="translate(894 92)">
      <rect class="pill" x="0" y="0" width="138" height="108" rx="32"/>
      <text class="code" x="28" y="78">02</text>
      <text class="label" x="0" y="288">找機會</text>
      <text class="hint" x="0" y="376">產業排行與熱門題材</text>
    </g>

    <g transform="translate(1704 92)">
      <rect class="pill" x="0" y="0" width="138" height="108" rx="32"/>
      <text class="code" x="27" y="78">03</text>
      <text class="label" x="0" y="288">查自選</text>
      <text class="hint" x="0" y="376">自選股票清單</text>
    </g>

    <g transform="translate(84 844)">
      <rect class="pill" x="0" y="0" width="138" height="108" rx="32"/>
      <text class="code" x="26" y="78">04</text>
      <text class="label" x="0" y="288">設提醒</text>
      <text class="hint" x="0" y="376">漲跌、機率、趨勢通知</text>
    </g>

    <g transform="translate(894 844)">
      <rect class="pill" x="0" y="0" width="138" height="108" rx="32"/>
      <text class="code" x="28" y="78">05</text>
      <text class="label" x="0" y="288">算報酬</text>
      <text class="hint" x="0" y="376">投入金額試算</text>
    </g>

    <g transform="translate(1704 844)">
      <rect class="pill" x="0" y="0" width="138" height="108" rx="32"/>
      <text class="code" x="27" y="78">06</text>
      <text class="label" x="0" y="288">深度分析</text>
      <text class="hint" x="0" y="376">K線、回測、新聞</text>
    </g>
  </g>
</svg>
