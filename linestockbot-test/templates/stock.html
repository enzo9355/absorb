<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ stock_name }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">
<div class="container py-5">

<h1>{{ stock_name }} ({{ stock_code }})</h1>
<p class="text-secondary">AI 股票分析頁</p>

<div class="card bg-secondary p-4 mt-4">
<pre style="white-space: pre-wrap; color:white;">{{ analysis }}</pre>
</div>

{% if image_url %}
<div class="mt-4">
<img src="{{ image_url }}" class="img-fluid rounded">
</div>
{% endif %}

</div>
</body>
</html>
