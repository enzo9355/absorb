<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#122643">
  <meta name="description" content="ABSORB 已驗證市場觀察系統">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ABSORB">
  <meta property="og:title" content="ABSORB｜已驗證市場觀察">
  <meta property="og:description" content="整理已發生的市場、產業、個股事件與 ETF 資料。">
  <meta property="og:image" content="{{ url_for('static', filename='brand/social-preview-1200x630.png', _external=True) }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ABSORB｜Verified Market Observations">
  <meta name="twitter:description" content="已驗證市場觀察">
  <meta name="twitter:image" content="{{ url_for('static', filename='brand/social-preview-1200x630.png', _external=True) }}">
  <title>{% block title %}ABSORB{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='brand/favicon.ico') }}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='brand/favicon-32x32.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='brand/apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="canonical" href="{{ request.base_url }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"ABSORB","applicationCategory":"FinanceApplication","operatingSystem":"Web, LINE","description":"已驗證市場觀察"}</script>
  {% block head %}{% endblock %}
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要內容</a>
  <div class="app-shell">
    <aside class="sidebar" aria-label="主要導覽">
      <a class="brand" href="{{ url_for('dashboard_page') }}"><img class="brand-mark" src="{{ url_for('static', filename='brand/absorb-mark-64.png') }}" alt="ABSORB logo"><span>ABSORB</span></a>
      <nav class="nav-list">
        <a class="nav-link {{ 'active' if request.endpoint == 'dashboard_page' else '' }}" href="{{ url_for('dashboard_page') }}">今天市場</a>
        <a class="nav-link {{ 'active' if request.endpoint == 'market_page' else '' }}" href="{{ url_for('market_page') }}">市場實況</a>
        <a class="nav-link {{ 'active' if request.endpoint == 'industries_page' else '' }}" href="{{ url_for('industries_page') }}">產業觀察</a>
        <a class="nav-link {{ 'active' if request.endpoint in ('stocks_page', 'stock_page') else '' }}" href="{{ url_for('stocks_page') }}">個股與 ETF</a>
        <a class="nav-link {{ 'active' if request.endpoint and 'report' in request.endpoint else '' }}" href="{{ url_for('reports_page') }}">每日報告</a>
        <a class="nav-link {{ 'active' if request.endpoint == 'ask_page' else '' }}" href="{{ url_for('ask_page') }}">Ask ABSORB</a>
        <a class="nav-link {{ 'active' if request.endpoint == 'learn_page' else '' }}" href="{{ url_for('learn_page') }}">學習</a>
      </nav>
      <section class="account-nav" data-account-nav>
        <a class="button line-login-button" href="{{ url_for('line_login', return_to=request.path) }}">使用 LINE 登入</a>
        <p>登入後可同步關注與提醒</p>
      </section>
      <details class="sidebar-disclosure"><summary>市場觀察聲明</summary><p>AI 預測研究中。正式服務只呈現已發生且通過資料驗證的市場資訊；事件條件與統計摘要都不是買賣指令。</p></details>
    </aside>
    <div class="content-column">
      <main class="main-content" id="main-content" tabindex="-1">{% block content %}{% endblock %}</main>
      <footer class="site-footer">ABSORB｜已驗證市場觀察</footer>
    </div>
  </div>
  <nav class="mobile-nav" aria-label="行動版導覽">
    <a href="{{ url_for('dashboard_page') }}">今天</a>
    <a href="{{ url_for('market_page') }}">市場</a>
    <a href="{{ url_for('stocks_page') }}">個股</a>
    <a href="{{ url_for('reports_page') }}">每日報告</a>
    <details class="mobile-more"><summary>更多</summary><div><a href="{{ url_for('industries_page') }}">產業</a><a href="{{ url_for('ask_page') }}">Ask</a><a href="{{ url_for('learn_page') }}">學習</a><a href="{{ url_for('account_page') }}" data-mobile-account>登入</a></div></details>
  </nav>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
