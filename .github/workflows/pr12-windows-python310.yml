name: PR12 Windows Python 3.10 verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose-full-suite:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-report.txt

      - name: Provision pinned Noto CJK test fonts
        shell: powershell
        run: |
          $commit = 'f8d157532fbfaeda587e826d4cd5b21a49186f7c'
          Invoke-WebRequest -UseBasicParsing `
            -Uri "https://raw.githubusercontent.com/notofonts/noto-cjk/$commit/Sans/Variable/TTF/Subset/NotoSansTC-VF.ttf" `
            -OutFile 'C:\Windows\Fonts\NotoSansTC-VF.ttf'
          Invoke-WebRequest -UseBasicParsing `
            -Uri "https://raw.githubusercontent.com/notofonts/noto-cjk/$commit/Serif/Variable/TTF/Subset/NotoSerifTC-VF.ttf" `
            -OutFile 'C:\Windows\Fonts\NotoSerifTC-VF.ttf'

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet -r requirements-report.txt
          python -m pip check

      - name: Run full suite and capture result
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          & cmd.exe /d /s /c "python -m unittest discover -s tests -v > full-suite.log 2>&1"
          $code = $LASTEXITCODE
          $ErrorActionPreference = 'Stop'
          $code | Set-Content -LiteralPath full-suite-exit-code.txt -Encoding ascii
          exit 0

      - name: Post all failure blocks to PR
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $log = Get-Content -LiteralPath full-suite.log -Raw
          $separator = '======================================================================'
          $blocks = [regex]::Split($log, '(?m)^={70}\r?$')
          $failureBlocks = New-Object System.Collections.Generic.List[string]
          foreach ($block in $blocks) {
            if ($block -match '(?m)^(FAIL|ERROR):') {
              $failureBlocks.Add($separator + "`r`n" + $block.Trim())
            }
          }
          $totals = [regex]::Match(
            $log,
            '(?ms)-{70}\r?\nRan\s+\d+\s+tests?.*?\z'
          ).Value
          $summary = [string]::Join("`r`n`r`n", $failureBlocks)
          if ($totals) {
            $summary += "`r`n`r`n" + $totals.Trim()
          }
          if (-not $summary) {
            $summary = 'No unittest FAIL/ERROR block was parsed.'
          }
          if ($summary.Length -gt 24000) {
            $summary = $summary.Substring(0, 24000) + "`r`n[TRUNCATED]"
          }
          $body = @"
          ### Windows Python 3.10 all full-suite failures

          Commit: $env:GITHUB_SHA

          ``````text
          $summary
          ``````
          "@
          Set-Content -LiteralPath full-suite-comment.md -Value $body -Encoding utf8
          gh pr comment 12 --repo enzo9355/absorb --body-file full-suite-comment.md

      - name: Preserve full-suite failure status
        shell: powershell
        run: |
          $code = [int](Get-Content -LiteralPath full-suite-exit-code.txt -Raw)
          if ($code -ne 0) { exit $code }
