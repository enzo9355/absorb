name: PR12 Windows Python 3.10 verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-report.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python --version
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-report.txt
          python -m pip check

      - name: Run runtime resolver tests
        id: runtime_tests
        continue-on-error: true
        shell: powershell
        run: |
          python -m unittest tests.test_python_runtime_wrapper -v 2>&1 |
            Tee-Object -FilePath runtime-tests.log
          exit $LASTEXITCODE

      - name: Upload runtime resolver test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr12-runtime-tests
          path: runtime-tests.log
          if-no-files-found: error
          retention-days: 3

      - name: Stop after runtime resolver failure
        if: steps.runtime_tests.outcome == 'failure'
        shell: powershell
        run: |
          Get-Content -LiteralPath runtime-tests.log
          exit 1

      - name: Run scheduler tests
        shell: powershell
        run: python -m unittest tests.test_pipeline_scheduler -v

      - name: Run focused reliability tests
        shell: powershell
        run: |
          python -m unittest `
            tests.test_python_runtime_wrapper `
            tests.test_pipeline_scheduler `
            tests.test_native_process_wrapper `
            tests.test_local_quant_task `
            -v

      - name: Run full test suite
        shell: powershell
        run: python -m unittest discover -s tests -v

      - name: Compile Python
        shell: powershell
        run: |
          python -m compileall -q reporting stock_papi tests
          python -m py_compile local_quant.py

      - name: Check JavaScript syntax
        shell: powershell
        run: node --check static/app.js

      - name: Validate Windows PowerShell 5.1 syntax
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $paths = @(
            'scripts/python_runtime.ps1',
            'scripts/run_tw_post_close_pipeline.ps1',
            'scripts/run_tw_pre_market_pipeline.ps1',
            'scripts/invoke_pipeline_task.ps1',
            'scripts/native_process.ps1'
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path -LiteralPath $path).Path,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -ne 0) {
              $errors | Format-List * | Out-String | Write-Error
              throw "PowerShell parser failed: $path"
            }
          }

      - name: Verify diff and safety invariants
        shell: powershell
        run: |
          git diff --check origin/main...HEAD
          python -c "from pathlib import Path; from reporting.regression_input_builder import PRODUCTION_REGRESSION_SOURCE_ADAPTER_READY, PRODUCTION_REGRESSION_INPUT_READY, PRODUCTION_REGRESSION_ARTIFACT_AVAILABLE, AGGREGATE_MANIFEST_INTERVAL_VALIDATION_READY; assert not any((PRODUCTION_REGRESSION_SOURCE_ADAPTER_READY, PRODUCTION_REGRESSION_INPUT_READY, PRODUCTION_REGRESSION_ARTIFACT_AVAILABLE, AGGREGATE_MANIFEST_INTERVAL_VALIDATION_READY)); assert not Path('backtests/v1/latest-TW.json').exists()"

      - name: Record verification summary
        if: always()
        shell: powershell
        run: |
          "Python: $(python --version 2>&1)" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
          "Runner: $env:RUNNER_OS" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
          "Commit: $env:GITHUB_SHA" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
