name: PR12 Windows Python 3.10 verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose-full-suite:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-report.txt

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet -r requirements-report.txt
          python -m pip check

      - name: Run full suite and capture result
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          & python -m unittest discover -s tests -v 2>&1 |
            Tee-Object -FilePath full-suite.log
          $code = $LASTEXITCODE
          $ErrorActionPreference = 'Stop'
          $code | Set-Content -LiteralPath full-suite-exit-code.txt -Encoding ascii
          exit 0

      - name: Post bounded full-suite diagnostic to PR
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $log = Get-Content -LiteralPath full-suite.log -Raw
          if ($log.Length -gt 45000) {
            $log = $log.Substring($log.Length - 45000)
          }
          $body = @"
          ### Windows Python 3.10 full-suite diagnostic

          Commit: $env:GITHUB_SHA

          ``````text
          $log
          ``````
          "@
          Set-Content -LiteralPath full-suite-comment.md -Value $body -Encoding utf8
          gh pr comment 12 --repo enzo9355/absorb --body-file full-suite-comment.md

      - name: Preserve full-suite failure status
        shell: powershell
        run: |
          $code = [int](Get-Content -LiteralPath full-suite-exit-code.txt -Raw)
          if ($code -ne 0) { exit $code }
