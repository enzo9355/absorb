name: PR12 Windows Python 3.10 verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-report.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Provision pinned Noto CJK test fonts
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $commit = 'f8d157532fbfaeda587e826d4cd5b21a49186f7c'
          $fonts = @(
            @{
              Uri = "https://raw.githubusercontent.com/notofonts/noto-cjk/$commit/Sans/Variable/TTF/Subset/NotoSansTC-VF.ttf"
              Destination = 'C:\Windows\Fonts\NotoSansTC-VF.ttf'
            },
            @{
              Uri = "https://raw.githubusercontent.com/notofonts/noto-cjk/$commit/Serif/Variable/TTF/Subset/NotoSerifTC-VF.ttf"
              Destination = 'C:\Windows\Fonts\NotoSerifTC-VF.ttf'
            }
          )
          foreach ($font in $fonts) {
            Invoke-WebRequest -UseBasicParsing -Uri $font.Uri -OutFile $font.Destination
            $item = Get-Item -LiteralPath $font.Destination
            if ($item.Length -lt 1MB) {
              throw "Downloaded test font is unexpectedly small: $($font.Destination)"
            }
          }

      - name: Install Python dependencies
        shell: powershell
        run: |
          python --version
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-report.txt
          python -m pip check

      - name: Run runtime resolver tests
        shell: powershell
        run: python -m unittest tests.test_python_runtime_wrapper -v

      - name: Repeat runtime resolver tests
        shell: powershell
        run: python -m unittest tests.test_python_runtime_wrapper -v

      - name: Run scheduler tests
        shell: powershell
        run: python -m unittest tests.test_pipeline_scheduler -v

      - name: Run daily report CLI tests
        shell: powershell
        run: python -m unittest tests.test_daily_report_cli -v

      - name: Run focused reliability tests
        shell: powershell
        run: |
          python -m unittest `
            tests.test_python_runtime_wrapper `
            tests.test_pipeline_scheduler `
            tests.test_native_process_wrapper `
            tests.test_local_quant_task `
            tests.test_daily_report_cli `
            -v

      - name: Run full test suite
        shell: powershell
        run: python -m unittest discover -s tests -v

      - name: Compile Python
        shell: powershell
        run: |
          python -m compileall -q reporting stock_papi tests
          python -m py_compile local_quant.py

      - name: Check JavaScript syntax
        shell: powershell
        run: node --check static/app.js

      - name: Validate Windows PowerShell 5.1 syntax
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $paths = @(
            'scripts/python_runtime.ps1',
            'scripts/run_tw_post_close_pipeline.ps1',
            'scripts/run_tw_pre_market_pipeline.ps1',
            'scripts/invoke_pipeline_task.ps1',
            'scripts/native_process.ps1'
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path -LiteralPath $path).Path,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -ne 0) {
              $errors | Format-List * | Out-String | Write-Error
              throw "PowerShell parser failed: $path"
            }
          }

      - name: Verify diff and safety invariants
        shell: powershell
        run: |
          git diff --check origin/main...HEAD
          python -c "from pathlib import Path; from reporting.regression_input_builder import PRODUCTION_REGRESSION_SOURCE_ADAPTER_READY, PRODUCTION_REGRESSION_INPUT_READY, PRODUCTION_REGRESSION_ARTIFACT_AVAILABLE, AGGREGATE_MANIFEST_INTERVAL_VALIDATION_READY; assert not any((PRODUCTION_REGRESSION_SOURCE_ADAPTER_READY, PRODUCTION_REGRESSION_INPUT_READY, PRODUCTION_REGRESSION_ARTIFACT_AVAILABLE, AGGREGATE_MANIFEST_INTERVAL_VALIDATION_READY)); assert not Path('backtests/v1/latest-TW.json').exists()"
