name: PR12 Windows Python 3.10 verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-runtime:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Show runtime context
        shell: powershell
        run: |
          python --version
          Get-Command powershell.exe | Format-List Name,Source,Version
          Get-Command python | Format-List Name,Source,CommandType

      - name: Run runtime resolver tests
        shell: powershell
        run: python -m unittest tests.test_python_runtime_wrapper -v
