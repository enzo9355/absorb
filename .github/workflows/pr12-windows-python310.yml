name: PR12 Windows Python 3.10 verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose-runtime:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run runtime resolver tests and capture result
        shell: powershell
        run: |
          python -m unittest tests.test_python_runtime_wrapper -v 2>&1 |
            Tee-Object -FilePath runtime-tests.log
          $LASTEXITCODE | Set-Content -LiteralPath runtime-exit-code.txt -Encoding ascii
          exit 0

      - name: Post bounded diagnostic to PR
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $log = Get-Content -LiteralPath runtime-tests.log -Raw
          if ($log.Length -gt 30000) {
            $log = $log.Substring($log.Length - 30000)
          }
          $body = @"
          ### Windows Python 3.10 runtime-test diagnostic

          Commit: `$env:GITHUB_SHA`

          ``````text
          $log
          ``````
          "@
          Set-Content -LiteralPath runtime-comment.md -Value $body -Encoding utf8
          gh pr comment 12 --repo enzo9355/absorb --body-file runtime-comment.md

      - name: Preserve test failure status
        shell: powershell
        run: |
          $code = [int](Get-Content -LiteralPath runtime-exit-code.txt -Raw)
          if ($code -ne 0) { exit $code }
