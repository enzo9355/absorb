name: PR12 Windows Python 3.10 verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-report.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Provision pinned Noto CJK test fonts
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $commit = 'f8d157532fbfaeda587e826d4cd5b21a49186f7c'
          $fonts = @(
            @{
              Uri = "https://raw.githubusercontent.com/notofonts/noto-cjk/$commit/Sans/Variable/TTF/Subset/NotoSansTC-VF.ttf"
              Destination = 'C:\Windows\Fonts\NotoSansTC-VF.ttf'
            },
            @{
              Uri = "https://raw.githubusercontent.com/notofonts/noto-cjk/$commit/Serif/Variable/TTF/Subset/NotoSerifTC-VF.ttf"
              Destination = 'C:\Windows\Fonts\NotoSerifTC-VF.ttf'
            }
          )
          foreach ($font in $fonts) {
            Invoke-WebRequest -UseBasicParsing -Uri $font.Uri -OutFile $font.Destination
            $item = Get-Item -LiteralPath $font.Destination
            if ($item.Length -lt 1MB) {
              throw "Downloaded test font is unexpectedly small: $($font.Destination)"
            }
            Get-FileHash -LiteralPath $font.Destination -Algorithm SHA256 |
              Select-Object Path,Hash
          }

      - name: Install Python dependencies
        shell: powershell
        run: |
          python --version
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-report.txt
          python -m pip check

      - name: Run runtime resolver tests
        shell: powershell
        run: |
          & cmd.exe /d /s /c "python -m unittest tests.test_python_runtime_wrapper -v > runtime-tests.log 2>&1"
          if ($LASTEXITCODE -ne 0) {
            Get-Content -LiteralPath runtime-tests.log
            exit $LASTEXITCODE
          }

      - name: Repeat runtime resolver tests
        shell: powershell
        run: |
          & cmd.exe /d /s /c "python -m unittest tests.test_python_runtime_wrapper -v > runtime-tests-repeat.log 2>&1"
          if ($LASTEXITCODE -ne 0) {
            Get-Content -LiteralPath runtime-tests-repeat.log
            exit $LASTEXITCODE
          }

      - name: Run scheduler tests
        shell: powershell
        run: |
          & cmd.exe /d /s /c "python -m unittest tests.test_pipeline_scheduler -v > scheduler-tests.log 2>&1"
          if ($LASTEXITCODE -ne 0) {
            Get-Content -LiteralPath scheduler-tests.log
            exit $LASTEXITCODE
          }

      - name: Run focused reliability tests
        shell: powershell
        run: |
          & cmd.exe /d /s /c "python -m unittest tests.test_python_runtime_wrapper tests.test_pipeline_scheduler tests.test_native_process_wrapper tests.test_local_quant_task -v > focused-tests.log 2>&1"
          if ($LASTEXITCODE -ne 0) {
            Get-Content -LiteralPath focused-tests.log
            exit $LASTEXITCODE
          }

      - name: Run full test suite
        shell: powershell
        run: |
          & cmd.exe /d /s /c "python -m unittest discover -s tests -v > full-suite.log 2>&1"
          if ($LASTEXITCODE -ne 0) {
            Get-Content -LiteralPath full-suite.log -Tail 200
            exit $LASTEXITCODE
          }

      - name: Compile Python
        shell: powershell
        run: |
          python -m compileall -q reporting stock_papi tests
          python -m py_compile local_quant.py

      - name: Check JavaScript syntax
        shell: powershell
        run: node --check static/app.js

      - name: Validate Windows PowerShell 5.1 syntax
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $paths = @(
            'scripts/python_runtime.ps1',
            'scripts/run_tw_post_close_pipeline.ps1',
            'scripts/run_tw_pre_market_pipeline.ps1',
            'scripts/invoke_pipeline_task.ps1',
            'scripts/native_process.ps1'
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path -LiteralPath $path).Path,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -ne 0) {
              $errors | Format-List * | Out-String | Write-Error
              throw "PowerShell parser failed: $path"
            }
          }

      - name: Verify diff and safety invariants
        shell: powershell
        run: |
          git diff --check origin/main...HEAD
          python -c "from pathlib import Path; from reporting.regression_input_builder import PRODUCTION_REGRESSION_SOURCE_ADAPTER_READY, PRODUCTION_REGRESSION_INPUT_READY, PRODUCTION_REGRESSION_ARTIFACT_AVAILABLE, AGGREGATE_MANIFEST_INTERVAL_VALIDATION_READY; assert not any((PRODUCTION_REGRESSION_SOURCE_ADAPTER_READY, PRODUCTION_REGRESSION_INPUT_READY, PRODUCTION_REGRESSION_ARTIFACT_AVAILABLE, AGGREGATE_MANIFEST_INTERVAL_VALIDATION_READY)); assert not Path('backtests/v1/latest-TW.json').exists()"

      - name: Post concise verification result to PR
        if: always()
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          function Get-TestCount([string]$Path) {
            if (-not (Test-Path -LiteralPath $Path -PathType Leaf)) { return 'not-run' }
            $text = Get-Content -LiteralPath $Path -Raw
            $match = [regex]::Match($text, 'Ran\s+(\d+)\s+tests?')
            if ($match.Success) { return $match.Groups[1].Value }
            return 'unknown'
          }
          $runtime = Get-TestCount 'runtime-tests.log'
          $runtimeRepeat = Get-TestCount 'runtime-tests-repeat.log'
          $scheduler = Get-TestCount 'scheduler-tests.log'
          $focused = Get-TestCount 'focused-tests.log'
          $full = Get-TestCount 'full-suite.log'
          $body = @"
          ### Windows Python 3.10 final verification

          Commit: $env:GITHUB_SHA

          - Runtime resolver tests: $runtime
          - Runtime resolver repeat: $runtimeRepeat
          - Scheduler tests: $scheduler
          - Focused reliability tests: $focused
          - Full suite: $full
          - Pinned test fonts: notofonts/noto-cjk@$commit

          See the workflow run for individual step conclusions.
          "@
          Set-Content -LiteralPath verification-comment.md -Value $body -Encoding utf8
          gh pr comment 12 --repo enzo9355/absorb --body-file verification-comment.md
