name: PR12 Windows Python 3.10 verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose-daily-report-cli:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-report.txt

      - name: Provision pinned Noto CJK test fonts
        shell: powershell
        run: |
          $commit = 'f8d157532fbfaeda587e826d4cd5b21a49186f7c'
          Invoke-WebRequest -UseBasicParsing `
            -Uri "https://raw.githubusercontent.com/notofonts/noto-cjk/$commit/Sans/Variable/TTF/Subset/NotoSansTC-VF.ttf" `
            -OutFile 'C:\Windows\Fonts\NotoSansTC-VF.ttf'
          Invoke-WebRequest -UseBasicParsing `
            -Uri "https://raw.githubusercontent.com/notofonts/noto-cjk/$commit/Serif/Variable/TTF/Subset/NotoSerifTC-VF.ttf" `
            -OutFile 'C:\Windows\Fonts\NotoSerifTC-VF.ttf'

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet -r requirements-report.txt
          python -m pip check

      - name: Run daily report CLI tests and capture output
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          & cmd.exe /d /s /c "python -m unittest tests.test_daily_report_cli -v > daily-report-cli.log 2>&1"
          $code = $LASTEXITCODE
          $ErrorActionPreference = 'Stop'
          $code | Set-Content -LiteralPath daily-report-cli-exit-code.txt -Encoding ascii
          exit 0

      - name: Post daily report CLI diagnostic to PR
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $log = Get-Content -LiteralPath daily-report-cli.log -Raw
          if ($log.Length -gt 20000) {
            $log = $log.Substring($log.Length - 20000)
          }
          $body = @"
          ### Windows Python 3.10 daily-report CLI diagnostic

          Commit: $env:GITHUB_SHA

          ``````text
          $log
          ``````
          "@
          Set-Content -LiteralPath cli-comment.md -Value $body -Encoding utf8
          gh pr comment 12 --repo enzo9355/absorb --body-file cli-comment.md

      - name: Preserve CLI test status
        shell: powershell
        run: |
          $code = [int](Get-Content -LiteralPath daily-report-cli-exit-code.txt -Raw)
          if ($code -ne 0) { exit $code }
